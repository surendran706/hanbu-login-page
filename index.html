<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log into Instagram</title>
 <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .container {
    width: 100%;
    max-width: 400px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 12px;
    border: 1px solid #dbdb;
    border-radius: 12px;
    font-size: 15px;
    background: #fafafa;
    outline: none;
  }

  input:focus {
    border-color: #a8a8a8;
    background: #fff;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: #0095f6;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }

  .btn-login:disabled {
    background: #b2dffc;
  }

  .forgot {
    text-align: center;
    margin: 18px 0;
    font-size: 14px;
    color: #000;
  }

  .fb-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid #dbdb;
    border-radius: 25px;
    background: #fff;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  .fb-icon {
    width: 18px;
    height: 18px;
    background: #1877f2;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
  }

  .signup-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid #0094f6;
    border-radius: 25px;
    background: #fff;
    color: #0095f6;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 30px;
  }

  .meta {
    text-align: center;
    color: #8e8e8e;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .meta-logo {
    color: #0095f6;
    font-size: 18px;
  }
</style>
</head>
<body>
  <div class="container">
    <h2>Log into Instagram</h2>
    
    <form>
      <input type="text" placeholder="Mobile number, username or email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" class="btn-login">Log in</button>
    </form>

    <div class="forgot">Forgot password?</div>

    <button class="fb-btn">
      <span class="fb-icon">f</span>
      Log in with Facebook
    </button>

    <button class="signup-btn">Create new account</button>

    <div class="meta">
      <span class="meta-logo">∞</span> Meta
    </div>
  </div>
<a href="https://www.google.com/search?q=instagram&oq=inst&gs_lcrp=EgZjaHJvbWUqBwgCEAAYjwIyBggAEEUYOzIGCAEQRRg5MgcIAhAAGI8CMgcIAxAAGI8CMgcIBBAAGI8CMgYIBRBFGDwyBggGEEUYPDIGCAcQRRg80gEINDg1NGowajeoAgCwAgA&sourceid=chrome&ie=UTF-8">login</a>
</body>
</html>
